# ~/.tmux.common.conf - shared tmux config (tracked in dotfiles).
# Portable, machine-agnostic. Sourced by ~/.tmux.conf.

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'sainnhe/tmux-fzf'
TMUX_FZF_ORDER="pane|window|clipboard|command|process"
TMUX_FZF_LAUNCH_KEY="C-f"
TMUX_FZF_MENU=\
"quick-swap-pane\ntmux swap-pane && tmux select-pane -m && tmux select-pane -m\n"\

# set -g @plugin 'erikw/tmux-powerline'

# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @resurrect-dir '$HOME/.tmux/.resurrect'
# set -g @resurrect-save 'C-l'
# set -g @resurrect-restore 'C-k'
# set -g @plugin 'spywhere/tmux-named-snapshot'

# easy motion
set -g @plugin 'schasse/tmux-jump'

# system clipboard
set -g @plugin 'tmux-plugins/tmux-yank'

# # translator
# set -g @plugin 'sainnhe/tmux-translator'
# # the key to trigger translation
# set -g @tmux-translator "t"
# # the width of popup window
# set -g @tmux-translator-width "50%"
# # the height of popup window
# set -g @tmux-translator-height "50%"
# # translate from
# set -g @tmux-translator-from "en"
# # translate to
# set -g @tmux-translator-to "kr"
# # engine
# set -g @tmux-translator-engine "google"

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of
# tmux.conf)
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
run '~/.tmux/plugins/tpm/tpm'


# keyboard escape time
set -g escape-time 10


# mouse scroll
# set -g mouse on

set -g terminal-overrides 'xterm*:smcup@:rmcup@'

# Truecolor (24-bit RGB) passthrough
set -g default-terminal "tmux-256color"
set -ga terminal-features ",*256col*:RGB"
set -ga terminal-overrides ",*256col*:Tc"

set -g status-keys vi
setw -g mode-keys vi

# Change prefix bind-key
unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

bind | split-window -h

bind C-s set-option -g status

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
# bind h select-pane -L
# bind l select-pane -R
# bind k select-pane -U
# bind j select-pane -D

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window
bind -r H previous-window
bind -r L next-window

# Multi-client window size control
set -g aggressive-resize off
set -g window-size smallest

bind-key C-w run-shell '
ses="#{session_name}"
val=$(tmux show -t "$ses" window-size 2>/dev/null | awk "{print \$2}");
s_small="   smallest"; s_large="   largest"; s_latest="   latest";
[ "$val" = "smallest" ] && s_small="✓ smallest";
[ "$val" = "latest"   ] && s_latest="✓ latest";
[ "$val" = "largest"  ] && s_large="✓ largest";
tmux display-menu -T "window-size [$val] · #{session_name}" -x R -y P \
  "$s_small" s "set -t \"#{session_name}\" window-size smallest" \
  "$s_latest" m "set -t \"#{session_name}\" window-size latest"  \
  "$s_large" l "set -t \"#{session_name}\" window-size largest"
'

# Zoom
bind -n M-z resize-pane -Z

# Mark
bind -n M-m select-pane -m

# scrollback buffer size increase
set -g history-limit 100000

# change window order
# bind-key -n C-S-Left swap-pane -D
# bind-key -n C-S-Right swap-pane -D
bind-key -n C-M-Left  swap-pane -s "{left-of}"
bind-key -n C-M-Right swap-pane -s "{right-of}"
bind-key -n C-M-Up    swap-pane -s "{up-of}"
bind-key -n C-M-Down  swap-pane -s "{down-of}"

bind-key -n C-S-Left  swap-window -t -1 \; select-window -t -1
bind-key -n C-S-Right swap-window -t +1 \; select-window -t +1

# disable window name auto change
set-option -g allow-rename off

# bar color
set -g status-bg black
set -g status-fg white

set -g base-index 1          # 윈도우 인덱스를 1부터 시작
# setw -g pane-base-index 1     # 패널 인덱스를 1부터 시작
setw -g pane-base-index 10

set -g renumber-windows on

# key binding for ALT+num
# switch windows alt+number
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9
bind-key -n M-0 select-window -t 10
bind-key -n M-q display-panes

# pane number display
# set-option -g display-panes-active-colour colour1 #blue
# set-option -g display-panes-colour colour3 #orange
# set-option -g display-panes-active-colour colour33 #blue
# set-option -g display-panes-colour colour166 #orange

set -g window-style        'fg=default,bg=black,dim'
set -g window-active-style 'fg=default,bg=colour234'
set -g pane-border-lines heavy
set -g pane-border-status top


if-shell "test -f ~/.tmux/.tmux.theme.conf" "source ~/.tmux/.tmux.theme.conf"

# bell-bash: highlight a window in the status line when a bell fires in it.
# Mirrors alert-bash/bell.tmux.conf (bell-action other = only non-current
# windows). Kept inline here so the tracked dotfiles own the tmux wiring
# instead of bell-bash's installer editing ~/.tmux.conf.
# >>> bell-bash >>>
setw -g monitor-bell on
set  -g visual-bell off
set  -g bell-action other
setw -g window-status-bell-style 'fg=#000000,bg=yellow,bold'
# <<< bell-bash <<<
