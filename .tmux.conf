# ~/.tmux.conf - entry point. Shared config lives in ~/.tmux.common.conf.
# Add this host's own tmux settings below (e.g. tool integrations).
source-file ~/.tmux.common.conf

# ============================================================
# Machine-specific settings below (edit per host)
# ============================================================

# OSC52 clipboard: accept application clipboard escapes and forward them to the
# outer terminal, so in-app copy (e.g. opero Ctrl+C on a mouse selection) reaches
# the local clipboard over SSH/tmux. tmux's default 'external' ignores OSC52 sent
# by applications.
set -g set-clipboard on
