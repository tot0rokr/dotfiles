# noti fallback config — used ONLY when the NOTI_WEBHOOK env var is unset.
#
# Do NOT commit a real webhook here (this file is tracked). Put the URL in
# ~/.config/noti/webhook (chmod 600); .bashrc.common exports it as
# NOTI_WEBHOOK, which takes precedence over anything set below.
#
# Example (keep commented):
# webhook = "https://hooks.slack.com/services/xxx/yyy/zzz"
# webhook = "https://discord.com/api/webhooks/xxx/yyy"
